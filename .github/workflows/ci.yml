# CI — SkillMaker GitHub Actions pipeline
# Jobs run in parallel unless explicitly ordered via `needs:`.
# Bootstrapping order (first merge to main requires admin override):
#   1. Merge this file via admin override (branch protection not yet active).
#   2. The push-to-main trigger fires; GitHub registers the 7 check contexts.
#   3. Apply branch protection requiring all 7 contexts (see GUIA-MONOREPO.md).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Lint: golangci-lint (backend) + ng lint (frontend) ──────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      # Install golangci-lint via the official install script, pinned to v1.64.8.
      # NOTE: golangci-lint-action@v7+ dropped support for golangci-lint v1.x
      # (it only installs v2), so the action cannot be used while the project is
      # on v1.64.8 with a v1-format .golangci.yml. Installing the binary directly
      # matches local behaviour 1:1 and lets `make lint` drive both backend-lint
      # (golangci-lint) and frontend-lint (ng lint) with no double-run.
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v1.64.8/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run lint (backend + frontend)
        run: make lint

  # ── Backend unit tests ───────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Run backend tests
        run: make backend-test

  # ── Backend integration tests (testcontainers — Docker available on ubuntu-latest) ──
  test-backend-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Run backend integration tests
        run: make backend-test-integration

  # ── Frontend tests (Vitest) ──────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Run frontend tests
        run: make frontend-test

  # ── Build: Go binary + Angular production bundle ─────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build backend and frontend
        run: make build

  # ── Docker image build (depends on build being green) ───────────────────────
  docker-build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: make docker-build

  # ── Types drift check: regenerate types.ts and assert no diff ───────────────
  types-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Install swag (OpenAPI generator — pinned version)
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Regenerate types and assert no drift
        run: make types && git diff --exit-code frontend/src/app/api/types.ts
