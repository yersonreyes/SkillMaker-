# docker-compose.yml (raiz) — Orquestacion de produccion (Dokploy)
#
# Servicios: postgres + minio + migrate (job) + backend + frontend
#
# Despliegue via Dokploy (tipo Compose):
#   - Traefik enruta los dominios a los servicios conectados a `dokploy-network`.
#   - frontend  -> https://skillmaker.yersonserver.com  (Dokploy Domains -> frontend:80)
#   - minio(API)-> https://minio2.yersonserver.com       (Dokploy Domains -> minio:9000)
#   - El frontend tambien queda expuesto en el host: 192.168.100.154:3799
#   - Los secretos se inyectan via el .env de Dokploy (NO se commitea).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # Sin "ports:" — NO expuesto al host, solo accesible por otros containers

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal          # acceso interno (backend) por nombre de servicio
      - dokploy-network    # Traefik enruta minio2.yersonserver.com -> minio:9000
    # El API S3 (9000) se publica por dominio en Dokploy para las URLs prefirmadas.

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/$${STORAGE_BUCKET} &&
      echo 'bucket listo: '$${STORAGE_BUCKET};
      exit 0;
      "
    restart: 'no'              # Job de un solo uso — crea el bucket privado
    networks:
      - internal

  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      up
    restart: 'no'                # Job de un solo uso
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully  # Espera a que migraciones pasen
    environment:
      APP_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_HOSTED_DOMAIN: ${GOOGLE_HOSTED_DOMAIN}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_USE_SSL: ${STORAGE_USE_SSL}
      STORAGE_PRESIGN_TTL: ${STORAGE_PRESIGN_TTL}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
    restart: unless-stopped
    networks:
      - internal          # postgres + nginx del frontend por nombre de servicio
    # Sin "ports:" — el frontend (nginx) hace proxy de /api -> backend:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3799:80'                                  # Host:3799 → nginx:80 (acceso LAN directo)
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal          # alcanza a backend:3000 para el proxy /api
      - dokploy-network    # Traefik enruta skillmaker.yersonserver.com -> frontend:80

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
