# docker-compose.yml (raiz) — Orquestacion de produccion (Dokploy)
#
# Servicios: postgres + migrate (job) + backend + frontend
#
# MinIO NO se levanta aqui: es un servicio EXTERNO ya provisionado en otro equipo
# (minio2.yersonserver.com). El backend solo se conecta via STORAGE_* del .env.
#
# Despliegue via Dokploy (tipo Compose):
#   - Traefik enruta el dominio al servicio conectado a `dokploy-network`.
#   - frontend -> https://skillmaker.yersonserver.com  (Dokploy Domains -> frontend:80)
#   - El frontend tambien queda expuesto en el host: 192.168.100.154:3799
#   - Los secretos se inyectan via el .env de Dokploy (NO se commitea).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # Sin "ports:" — NO expuesto al host, solo accesible por otros containers

  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      up
    restart: 'no'                # Job de un solo uso
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully  # Espera a que migraciones pasen
    environment:
      APP_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Se construye desde piezas cortas para evitar lineas largas fragiles en el .env
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_HOSTED_DOMAIN: ${GOOGLE_HOSTED_DOMAIN}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}      # MinIO externo (minio2.yersonserver.com)
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_USE_SSL: ${STORAGE_USE_SSL}
      STORAGE_PRESIGN_TTL: ${STORAGE_PRESIGN_TTL}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
    restart: unless-stopped
    networks:
      - internal          # postgres + nginx del frontend por nombre de servicio
    # Sin "ports:" — el frontend (nginx) hace proxy de /api -> backend:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3799:80'                                  # Host:3799 → nginx:80 (acceso LAN directo)
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal          # alcanza a backend:3000 para el proxy /api
    # NOTA: NO se adjunta a dokploy-network (overlay/Swarm). Mezclar overlay +
    # publicacion de puerto rompe el arranque (libnetwork "endpoint not found").
    # El acceso es por host:3799. El dominio HTTPS se añade luego via Dokploy UI.

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
