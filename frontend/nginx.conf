server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tamano maximo de upload (material adjunto, RT-24b)
    client_max_body_size 50M;

    # Proxy API requests al backend Go
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Swagger UI (proxy directo al backend)
    location /api/docs {
        proxy_pass http://backend:3000/api/docs;
        proxy_set_header Host $host;
    }

    # No cachear index.html para que los deploys se vean inmediatamente
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Cache largo para assets versionados (Angular agrega hash al nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
