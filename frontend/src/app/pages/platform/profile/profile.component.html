<div class="p-6 max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">Mi perfil</h1>

  @if (auth.user(); as u) {
    <p-card>
      <dl class="space-y-5">
        <div>
          <dt class="text-sm font-medium text-gray-500">Nombre</dt>
          <dd class="text-lg font-medium text-gray-900 mt-0.5">{{ u.nombre }}</dd>
        </div>
        <div>
          <dt class="text-sm font-medium text-gray-500">Email corporativo</dt>
          <dd class="text-lg text-gray-900 mt-0.5">{{ u.email }}</dd>
        </div>
        <div>
          <dt class="text-sm font-medium text-gray-500">Roles asignados</dt>
          <dd class="flex flex-wrap gap-2 mt-1.5">
            @for (r of u.roles; track r) {
              <p-tag [value]="r" severity="info" />
            }
          </dd>
        </div>
        <div>
          <dt class="text-sm font-medium text-gray-500">ID interno</dt>
          <dd class="text-sm text-gray-700 font-mono mt-0.5 bg-gray-50 px-2 py-1 rounded border border-gray-200 inline-block">{{ u.id }}</dd>
        </div>
      </dl>
    </p-card>
  } @else {
    <p class="text-gray-500">No hay datos de usuario cargados.</p>
  }
</div>
