<div class="p-6 max-w-6xl mx-auto space-y-6">
  <header>
    <h1 class="text-3xl font-bold text-gray-900">Catalogo de cursos</h1>
    <p class="text-gray-600 mt-1">Explora los cursos aprobados disponibles para inscribirse.</p>
  </header>

  <p-card>
    <ng-template pTemplate="header">
      <div class="px-4 py-3 bg-primary-50 border-b border-primary-100 flex items-center gap-2">
        <i class="pi pi-info-circle text-primary-500"></i>
        <span class="font-medium text-primary-700">Pendiente de implementacion</span>
      </div>
    </ng-template>
    <p class="text-gray-700">
      El listado real de cursos se implementara en un cambio SDD posterior cuando se desarrollen
      los modulos <code class="bg-gray-100 px-1 rounded text-sm">courses</code> y
      <code class="bg-gray-100 px-1 rounded text-sm">enrollment</code> del backend.
    </p>
  </p-card>
</div>
