<!-- mi-contenido.component.html -->
<div class="p-4 space-y-4">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold">Mi contenido</h1>
    <p-button
      label="Nuevo curso"
      icon="pi pi-plus"
      severity="primary"
      (onClick)="openCreateDialog()" />
  </div>

  <!-- Table -->
  <p-table
    [value]="courses()"
    [lazy]="true"
    [paginator]="true"
    [rows]="pageSize()"
    [totalRecords]="total()"
    [loading]="loading()"
    (onLazyLoad)="onLazyLoad($event)"
    [rowsPerPageOptions]="[10, 20, 50]"
    dataKey="id"
    styleClass="p-datatable-sm">

    <ng-template #header>
      <tr>
        <th>Titulo</th>
        <th>Estado</th>
        <th>Creado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template #body let-course>
      <tr class="cursor-pointer" (click)="navigateToCourse(course.id)">
        <td>{{ course.titulo }}</td>
        <td>
          <p-tag
            [value]="estadoLabel(course.estado)"
            [severity]="estadoSeverity(course.estado)" />
        </td>
        <td>{{ course.createdAt | date:'dd/MM/yyyy' }}</td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [text]="true"
            severity="secondary"
            pTooltip="Editar curso"
            tooltipPosition="top"
            (onClick)="navigateToCourse(course.id); $event.stopPropagation()" />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="4" class="text-center text-gray-400 py-8">
          Aun no has creado ningun curso. Haz clic en "Nuevo curso" para empezar.
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<!-- Create Course Dialog -->
<p-dialog
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  header="Nuevo curso"
  [modal]="true"
  [style]="{ width: '480px' }"
  [closable]="true"
  (onHide)="closeDialog()">

  <div class="space-y-4 pt-2">
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium" for="nuevo-titulo">Titulo *</label>
      <input
        id="nuevo-titulo"
        pInputText
        type="text"
        [ngModel]="newTitulo()"
        (ngModelChange)="newTitulo.set($event)"
        placeholder="Nombre del curso (min. 3 caracteres)"
        class="w-full" />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium" for="nuevo-descripcion">Descripcion</label>
      <textarea
        id="nuevo-descripcion"
        pTextarea
        rows="4"
        [ngModel]="newDescripcion()"
        (ngModelChange)="newDescripcion.set($event)"
        placeholder="Descripcion del curso (opcional)"
        class="w-full">
      </textarea>
    </div>
  </div>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancelar"
        severity="secondary"
        [text]="true"
        (onClick)="closeDialog()" />
      <p-button
        label="Crear curso"
        icon="pi pi-check"
        [loading]="saving()"
        [disabled]="!newTitulo().trim()"
        (onClick)="onSaveDialog()" />
    </div>
  </ng-template>

</p-dialog>
