<!-- material-uploader.component.html — Cyanotype Workshop file picker -->
<div class="uploader">
  <label class="uploader__zone" [class.uploader__zone--busy]="uploading()">
    <input
      type="file"
      class="uploader__input"
      [disabled]="uploading()"
      [accept]="'application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/zip,application/x-zip-compressed,image/jpeg,image/png,image/gif,image/webp'"
      (change)="onInputChange($event)" />

    @if (uploading()) {
      <span class="uploader__hint">
        <i class="pi pi-spin pi-spinner"></i>
        Subiendo... {{ progress() }}%
      </span>
    } @else {
      <span class="uploader__hint">
        <i class="pi pi-upload"></i>
        Seleccionar archivo &mdash; PDF, Word, ZIP o imagen &middot; max 50 MB
      </span>
    }
  </label>

  @if (uploading()) {
    <div class="uploader__progress-bar">
      <div class="uploader__progress-fill" [style.width.%]="progress()"></div>
    </div>
  }
</div>
