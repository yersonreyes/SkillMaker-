basePath: /api
definitions:
  dto.ActivePatchRequest:
    properties:
      active:
        type: boolean
    required:
    - active
    type: object
  dto.GoogleLoginRequest:
    properties:
      idToken:
        type: string
    required:
    - idToken
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserDTO'
    type: object
  dto.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.RolesPatchRequest:
    properties:
      add:
        items:
          type: string
        type: array
      remove:
        items:
          type: string
        type: array
    required:
    - add
    - remove
    type: object
  dto.UserDTO:
    properties:
      email:
        type: string
      id:
        type: string
      nombre:
        type: string
      roles:
        items:
          type: string
        type: array
    type: object
  dto.UserDetail:
    properties:
      activo:
        type: boolean
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      nombre:
        type: string
      roles:
        items:
          type: string
        type: array
      updatedAt:
        type: string
    type: object
  httperr.Error:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: Plataforma interna de formación en video — LMS corporativo
  title: SkillMaker API
  version: "1.0"
paths:
  /auth/google:
    post:
      consumes:
      - application/json
      description: |-
        Valida el ID token de Google, verifica que el campo hd coincida con el
        dominio corporativo configurado (GOOGLE_HOSTED_DOMAIN), crea o actualiza
        el usuario por google_sub y retorna un JWT de acceso + refresh token opaco.
      parameters:
      - description: Google ID token obtenido del cliente
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: token invalido o dominio no autorizado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: error interno
          schema:
            $ref: '#/definitions/httperr.Error'
      summary: Login con Google Workspace
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Revoca el refresh token si existe. Retorna 204 en todos los casos
        (token inexistente, ya revocado, o revocado exitosamente).
        No requiere JWT en el header.
      parameters:
      - description: Refresh token a revocar
        in: body
        name: body
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      responses:
        "204":
          description: No Content
      summary: Revoca el refresh token de la sesion actual (idempotente)
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Valida el refresh token presentado, detecta replay attacks (OWASP),
        revoca el token anterior y emite un par nuevo (access + refresh).
      parameters:
      - description: Refresh token actual
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: token invalido, expirado o reutilizado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: error interno
          schema:
            $ref: '#/definitions/httperr.Error'
      summary: Renueva el access token rotando el refresh token
      tags:
      - auth
  /users:
    get:
      description: Retorna una pagina de usuarios. Solo administradores.
      parameters:
      - description: Pagina (default 1)
        in: query
        name: page
        type: integer
      - description: Tamano de pagina (max 100, default 20)
        in: query
        name: size
        type: integer
      - description: Busqueda por nombre o email (ILIKE)
        in: query
        name: q
        type: string
      - description: Filtro por rol exacto (alumno|creador|supervisor|administrador)
        in: query
        name: role
        type: string
      - description: Filtro por estado activo
        in: query
        name: active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: pagina de usuarios (items, page, size, total, totalPages)
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Lista usuarios (paginado y filtrado)
      tags:
      - users
  /users/{id}:
    get:
      description: Retorna el detalle de un usuario. Solo administradores.
      parameters:
      - description: UUID del usuario
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Detalle de usuario por ID
      tags:
      - users
  /users/{id}/active:
    patch:
      consumes:
      - application/json
      description: Establece el flag activo del usuario. Solo administradores.
      parameters:
      - description: UUID del usuario
        in: path
        name: id
        required: true
        type: string
      - description: Estado activo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActivePatchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserDetail'
        "400":
          description: body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: ultimo administrador activo
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Activa o desactiva un usuario (soft-delete)
      tags:
      - users
  /users/{id}/roles:
    patch:
      consumes:
      - application/json
      description: Aplica un delta de roles (add/remove). Solo administradores.
      parameters:
      - description: UUID del usuario
        in: path
        name: id
        required: true
        type: string
      - description: Delta de roles
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RolesPatchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserDetail'
        "400":
          description: rol invalido, conflicto add/remove, o body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: ultimo administrador activo
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Asigna o revoca roles a un usuario
      tags:
      - users
  /users/me:
    get:
      description: Retorna el detalle del usuario que realiza la peticion. Requiere
        JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Perfil del usuario autenticado
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
