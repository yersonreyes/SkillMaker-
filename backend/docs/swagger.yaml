basePath: /api
definitions:
  dto.ActivePatchRequest:
    properties:
      active:
        type: boolean
    required:
    - active
    type: object
  dto.CourseDetail:
    properties:
      creadorId:
        type: string
      createdAt:
        type: string
      descripcion:
        type: string
      estado:
        type: string
      hasContent:
        type: boolean
      id:
        type: string
      titulo:
        type: string
      updatedAt:
        type: string
    type: object
  dto.CreateCourseRequest:
    properties:
      descripcion:
        maxLength: 5000
        type: string
      titulo:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - titulo
    type: object
  dto.DownloadResponse:
    properties:
      expiresAt:
        type: string
      url:
        type: string
    type: object
  dto.GoogleLoginRequest:
    properties:
      idToken:
        type: string
    required:
    - idToken
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserDTO'
    type: object
  dto.MaterialConfirmRequest:
    properties:
      contentType:
        type: string
      key:
        type: string
      nombre:
        maxLength: 255
        minLength: 1
        type: string
      tamanoBytes:
        minimum: 1
        type: integer
    required:
    - contentType
    - key
    - nombre
    - tamanoBytes
    type: object
  dto.MaterialPresignRequest:
    properties:
      contentType:
        type: string
      nombre:
        maxLength: 255
        minLength: 1
        type: string
      tamanoBytes:
        minimum: 1
        type: integer
    required:
    - contentType
    - nombre
    - tamanoBytes
    type: object
  dto.MaterialResponse:
    properties:
      createdAt:
        type: string
      id:
        type: string
      mimeType:
        type: string
      nombre:
        description: mapped from MaterialModel.Titulo
        type: string
      tamanoBytes:
        type: integer
    type: object
  dto.PresignResponse:
    properties:
      expiresAt:
        type: string
      key:
        type: string
      uploadUrl:
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.ReorderRequest:
    properties:
      ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - ids
    type: object
  dto.RolesPatchRequest:
    properties:
      add:
        items:
          type: string
        type: array
      remove:
        items:
          type: string
        type: array
    required:
    - add
    - remove
    type: object
  dto.SectionCreateRequest:
    properties:
      titulo:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - titulo
    type: object
  dto.SectionResponse:
    properties:
      courseId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      orden:
        type: integer
      titulo:
        type: string
    type: object
  dto.SectionUpdateRequest:
    properties:
      titulo:
        maxLength: 200
        minLength: 1
        type: string
    type: object
  dto.SectionWithVideosResponse:
    properties:
      courseId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      orden:
        type: integer
      titulo:
        type: string
      videos:
        items:
          $ref: '#/definitions/dto.VideoResponse'
        type: array
    type: object
  dto.SupervisionCreateRequest:
    properties:
      empleadoId:
        type: string
      supervisorId:
        type: string
    required:
    - empleadoId
    - supervisorId
    type: object
  dto.SupervisionItem:
    properties:
      creadoEn:
        type: string
      empleadoId:
        type: string
      id:
        type: string
      supervisorId:
        type: string
    type: object
  dto.UpdateCourseRequest:
    properties:
      descripcion:
        maxLength: 5000
        type: string
      titulo:
        maxLength: 200
        minLength: 3
        type: string
    type: object
  dto.UserDTO:
    properties:
      email:
        type: string
      id:
        type: string
      nombre:
        type: string
      roles:
        items:
          type: string
        type: array
    type: object
  dto.UserDetail:
    properties:
      activo:
        type: boolean
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      nombre:
        type: string
      roles:
        items:
          type: string
        type: array
      updatedAt:
        type: string
    type: object
  dto.VideoCreateRequest:
    properties:
      duracionS:
        minimum: 0
        type: integer
      proveedor:
        enum:
        - youtube
        - vimeo
        type: string
      titulo:
        maxLength: 200
        minLength: 1
        type: string
      url:
        type: string
    required:
    - proveedor
    - titulo
    - url
    type: object
  dto.VideoResponse:
    properties:
      createdAt:
        type: string
      duracionS:
        type: integer
      id:
        type: string
      orden:
        type: integer
      proveedor:
        type: string
      sectionId:
        type: string
      titulo:
        type: string
      url:
        type: string
    type: object
  dto.VideoUpdateRequest:
    properties:
      duracionS:
        minimum: 0
        type: integer
      proveedor:
        enum:
        - youtube
        - vimeo
        type: string
      titulo:
        maxLength: 200
        minLength: 1
        type: string
      url:
        type: string
    type: object
  httperr.Error:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: Plataforma interna de formación en video — LMS corporativo
  title: SkillMaker API
  version: "1.0"
paths:
  /auth/google:
    post:
      consumes:
      - application/json
      description: |-
        Valida el ID token de Google, verifica que el campo hd coincida con el
        dominio corporativo configurado (GOOGLE_HOSTED_DOMAIN), crea o actualiza
        el usuario por google_sub y retorna un JWT de acceso + refresh token opaco.
      parameters:
      - description: Google ID token obtenido del cliente
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: token invalido o dominio no autorizado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: error interno
          schema:
            $ref: '#/definitions/httperr.Error'
      summary: Login con Google Workspace
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Revoca el refresh token si existe. Retorna 204 en todos los casos
        (token inexistente, ya revocado, o revocado exitosamente).
        No requiere JWT en el header.
      parameters:
      - description: Refresh token a revocar
        in: body
        name: body
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      responses:
        "204":
          description: No Content
      summary: Revoca el refresh token de la sesion actual (idempotente)
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Valida el refresh token presentado, detecta replay attacks (OWASP),
        revoca el token anterior y emite un par nuevo (access + refresh).
      parameters:
      - description: Refresh token actual
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: token invalido, expirado o reutilizado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: error interno
          schema:
            $ref: '#/definitions/httperr.Error'
      summary: Renueva el access token rotando el refresh token
      tags:
      - auth
  /courses:
    get:
      description: Retorna una pagina de cursos del caller. ?creator=me es obligatorio.
      parameters:
      - description: Debe ser 'me' (solo cursos propios)
        in: query
        name: creator
        required: true
        type: string
      - description: Pagina (default 1)
        in: query
        name: page
        type: integer
      - description: Tamano de pagina (max 100, default 20)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: pagina de cursos (items, page, size, total, totalPages)
          schema:
            type: object
        "400":
          description: creator debe ser 'me'
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: rol creador requerido
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Lista mis cursos (paginado)
      tags:
      - courses
    post:
      consumes:
      - application/json
      description: Crea un nuevo curso con estado=borrador. El creadorID viene del
        JWT.
      parameters:
      - description: Datos del curso
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CourseDetail'
        "400":
          description: titulo faltante o invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: rol creador requerido
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Crea un curso (borrador)
      tags:
      - courses
  /courses/{courseId}/materials:
    post:
      consumes:
      - application/json
      description: Persiste el material tras un PUT presignado exitoso. Re-valida
        tamano y MIME.
      parameters:
      - description: UUID del curso
        in: path
        name: courseId
        required: true
        type: string
      - description: Datos del material confirmado
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.MaterialConfirmRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.MaterialResponse'
        "400":
          description: clave de objeto invalida o campos faltantes
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: no es propietario del curso
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: estado no permite edicion
          schema:
            $ref: '#/definitions/httperr.Error'
        "413":
          description: archivo demasiado grande
          schema:
            $ref: '#/definitions/httperr.Error'
        "415":
          description: tipo de contenido no permitido
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Confirma la subida de un material (crea la fila en DB)
      tags:
      - materials
  /courses/{courseId}/materials/presign:
    post:
      consumes:
      - application/json
      description: Genera una URL PUT presignada para que el browser suba el archivo
        directamente a MinIO.
      parameters:
      - description: UUID del curso
        in: path
        name: courseId
        required: true
        type: string
      - description: Datos del archivo a subir
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.MaterialPresignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PresignResponse'
        "400":
          description: body invalido o campos faltantes
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: no es propietario del curso
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: estado no permite edicion
          schema:
            $ref: '#/definitions/httperr.Error'
        "413":
          description: archivo demasiado grande
          schema:
            $ref: '#/definitions/httperr.Error'
        "415":
          description: tipo de contenido no permitido
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Genera URL presignada para subir un archivo
      tags:
      - materials
  /courses/{courseId}/sections:
    post:
      consumes:
      - application/json
      description: Crea una seccion. El curso debe estar en borrador o rechazado y
        pertenecer al caller.
      parameters:
      - description: UUID del curso
        in: path
        name: courseId
        required: true
        type: string
      - description: Datos de la seccion
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SectionCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SectionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: no es propietario del curso
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: estado no permite edicion
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Crea una seccion en un curso
      tags:
      - sections
  /courses/{id}:
    get:
      description: Retorna el detalle de un curso. Solo el creador propietario puede
        verlo.
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CourseDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: rol creador requerido
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado o no pertenece al caller
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Detalle de curso por ID (solo owner)
      tags:
      - courses
    patch:
      consumes:
      - application/json
      description: Actualiza titulo y/o descripcion de un curso. Solo borrador o rechazado.
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar (parcial)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCourseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CourseDetail'
        "400":
          description: body invalido o sin campos
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: no es propietario del curso
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: estado no permite edicion
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Actualiza un curso (PATCH parcial, solo owner)
      tags:
      - courses
  /courses/{id}/materials:
    get:
      description: Retorna todos los materiales del curso ordenados por fecha de creacion
        ASC. Solo el propietario.
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.MaterialResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: rol creador requerido
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado o no pertenece al caller
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Lista los materiales de un curso
      tags:
      - materials
  /courses/{id}/materials/{materialId}/download:
    get:
      description: Retorna una URL GET presignada con TTL = PresignTTL. Solo el propietario
        del curso.
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      - description: UUID del material
        in: path
        name: materialId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DownloadResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: material o curso no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Genera URL presignada para descargar un material
      tags:
      - materials
  /courses/{id}/sections:
    get:
      description: 'Retorna el arbol de contenido del curso: secciones ordenadas por
        orden,'
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.SectionWithVideosResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: rol creador requerido
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado o no pertenece al caller
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Lista las secciones de un curso con sus videos anidados
      tags:
      - sections
  /courses/{id}/sections/reorder:
    patch:
      consumes:
      - application/json
      description: Actualiza el orden de las secciones. ids debe ser el conjunto exacto
        de secciones del curso.
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      - description: IDs en el nuevo orden
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ReorderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: IDs invalidos o incompletos
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Reordena las secciones de un curso
      tags:
      - sections
  /materials/{id}:
    delete:
      description: Elimina la fila de material y hace un best-effort delete del objeto
        en storage.
      parameters:
      - description: UUID del material
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: no es propietario del curso
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: material no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Elimina un material
      tags:
      - materials
  /sections/{id}:
    delete:
      description: Elimina la seccion y todos sus videos. Requiere ser propietario.
      parameters:
      - description: UUID de la seccion
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Elimina una seccion (y sus videos en cascada)
      tags:
      - sections
    patch:
      consumes:
      - application/json
      description: Actualiza titulo de una seccion. Requiere ser propietario del curso.
      parameters:
      - description: UUID de la seccion
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SectionUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SectionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httperr.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: seccion no encontrada
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
