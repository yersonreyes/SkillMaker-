basePath: /api
definitions:
  dto.ActivePatchRequest:
    properties:
      active:
        type: boolean
    required:
    - active
    type: object
  dto.AnswerRequest:
    properties:
      optionId:
        type: string
      questionId:
        type: string
    required:
    - optionId
    - questionId
    type: object
  dto.ApprovalHistoryDTO:
    properties:
      adminId:
        type: string
      comentario:
        type: string
      id:
        type: string
      resueltoEn:
        type: string
      resultado:
        type: string
    type: object
  dto.ApproveRequest:
    properties:
      comentario:
        type: string
    type: object
  dto.AttemptAnswerView:
    properties:
      optionId:
        type: string
      questionId:
        type: string
    type: object
  dto.AttemptStartResponse:
    properties:
      attemptId:
        type: string
      iniciadoEn:
        type: string
      numero:
        type: integer
    type: object
  dto.AttemptStateOptionResponse:
    properties:
      id:
        type: string
      texto:
        type: string
    type: object
  dto.AttemptStateQuestionResponse:
    properties:
      enunciado:
        type: string
      id:
        type: string
      options:
        items:
          $ref: '#/definitions/dto.AttemptStateOptionResponse'
        type: array
      puntaje:
        type: integer
      tipo:
        type: string
    type: object
  dto.AttemptStateResponse:
    properties:
      answers:
        items:
          $ref: '#/definitions/dto.AttemptAnswerView'
        type: array
      aprobado:
        type: boolean
      attemptId:
        type: string
      numero:
        type: integer
      puntaje:
        type: integer
      questions:
        items:
          $ref: '#/definitions/dto.AttemptStateQuestionResponse'
        type: array
      submitted:
        type: boolean
    type: object
  dto.BadgeResponse:
    properties:
      descripcion:
        description: Descripcion is the badge description.
        type: string
      id:
        description: ID is the badge UUID.
        type: string
      nombre:
        description: Nombre is the badge display name.
        type: string
      otorgadoEn:
        description: OtorgadoEn is the UTC timestamp when the badge was awarded.
        type: string
    type: object
  dto.CertificateListItem:
    properties:
      codigo:
        description: Codigo is the unique verification code printed on the certificate.
        type: string
      courseId:
        description: CourseID is the UUID of the course for which this cert was issued.
        type: string
      courseTitulo:
        description: CourseTitulo is the display title of the course (from courses
          seam).
        type: string
      emitidoEn:
        description: EmitidoEn is the ISO-8601 timestamp when the certificate was
          issued.
        type: string
      id:
        description: ID is the certificate UUID.
        type: string
    type: object
  dto.CertificateResponse:
    properties:
      codigo:
        description: Codigo is the unique verification code.
        type: string
      courseId:
        description: CourseID is the UUID of the course.
        type: string
      courseTitulo:
        description: CourseTitulo is the display title of the course.
        type: string
      emitidoEn:
        description: EmitidoEn is the issue timestamp.
        type: string
      id:
        description: ID is the certificate UUID.
        type: string
    type: object
  dto.CourseDetail:
    properties:
      creadorId:
        type: string
      createdAt:
        type: string
      descripcion:
        type: string
      estado:
        type: string
      hasContent:
        type: boolean
      id:
        type: string
      titulo:
        type: string
      updatedAt:
        type: string
    type: object
  dto.CourseDetailAlumnoResponse:
    properties:
      creadorNombre:
        type: string
      descripcion:
        type: string
      enrolled:
        description: always true
        type: boolean
      id:
        type: string
      materiales:
        items:
          $ref: '#/definitions/dto.MaterialResponse'
        type: array
      secciones:
        items:
          $ref: '#/definitions/dto.SectionWithVideosResponse'
        type: array
      titulo:
        type: string
    type: object
  dto.CoursePreviewResponse:
    properties:
      creadorNombre:
        type: string
      descripcion:
        type: string
      enrolled:
        description: always false
        type: boolean
      id:
        type: string
      titulo:
        type: string
    type: object
  dto.CreateCourseRequest:
    properties:
      descripcion:
        maxLength: 5000
        type: string
      titulo:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - titulo
    type: object
  dto.DownloadResponse:
    properties:
      expiresAt:
        type: string
      url:
        type: string
    type: object
  dto.DownloadURLResponse:
    properties:
      expiresAt:
        description: ExpiresAt is the UTC timestamp when the presigned URL expires.
        type: string
      url:
        description: URL is the presigned GET URL for the certificate PDF.
        type: string
    type: object
  dto.EnrollmentResponse:
    properties:
      courseId:
        type: string
      enrolled:
        description: always true on 200
        type: boolean
    type: object
  dto.EvaluationCreateRequest:
    properties:
      intentosMax:
        minimum: 0
        type: integer
      notaMinima:
        maximum: 100
        minimum: 0
        type: integer
    type: object
  dto.EvaluationDetail:
    properties:
      courseId:
        type: string
      id:
        type: string
      intentosMax:
        type: integer
      notaMinima:
        type: integer
      questions:
        items:
          $ref: '#/definitions/dto.QuestionDetail'
        type: array
    type: object
  dto.EvaluationResponse:
    properties:
      courseId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      intentosMax:
        type: integer
      notaMinima:
        type: integer
    type: object
  dto.EvaluationSummaryResponse:
    properties:
      evaluationId:
        type: string
      intentosMax:
        type: integer
      notaMinima:
        type: integer
    type: object
  dto.EvaluationUpdateRequest:
    properties:
      intentosMax:
        minimum: 0
        type: integer
      notaMinima:
        maximum: 100
        minimum: 0
        type: integer
    type: object
  dto.GoogleLoginRequest:
    properties:
      idToken:
        type: string
    required:
    - idToken
    type: object
  dto.ListBadgesResponse:
    properties:
      badges:
        items:
          $ref: '#/definitions/dto.BadgeResponse'
        type: array
    type: object
  dto.ListCertificatesResponse:
    properties:
      certificates:
        items:
          $ref: '#/definitions/dto.CertificateListItem'
        type: array
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserDTO'
    type: object
  dto.MaterialConfirmRequest:
    properties:
      contentType:
        type: string
      key:
        type: string
      nombre:
        maxLength: 255
        minLength: 1
        type: string
      tamanoBytes:
        minimum: 1
        type: integer
    required:
    - contentType
    - key
    - nombre
    - tamanoBytes
    type: object
  dto.MaterialPresignRequest:
    properties:
      contentType:
        type: string
      nombre:
        maxLength: 255
        minLength: 1
        type: string
      tamanoBytes:
        minimum: 1
        type: integer
    required:
    - contentType
    - nombre
    - tamanoBytes
    type: object
  dto.MaterialResponse:
    properties:
      createdAt:
        type: string
      id:
        type: string
      mimeType:
        type: string
      nombre:
        description: mapped from MaterialModel.Titulo
        type: string
      tamanoBytes:
        type: integer
    type: object
  dto.MyCourseItem:
    properties:
      completado:
        type: boolean
      courseId:
        type: string
      creadorNombre:
        type: string
      inscritoEn:
        type: string
      titulo:
        type: string
    type: object
  dto.OptionCreateRequest:
    properties:
      correcta:
        type: boolean
      texto:
        maxLength: 500
        minLength: 1
        type: string
    required:
    - texto
    type: object
  dto.OptionResponse:
    properties:
      correcta:
        type: boolean
      id:
        type: string
      orden:
        type: integer
      questionId:
        type: string
      texto:
        type: string
    type: object
  dto.OptionUpdateRequest:
    properties:
      correcta:
        type: boolean
      texto:
        maxLength: 500
        minLength: 1
        type: string
    type: object
  dto.PendingItemDTO:
    properties:
      creadorId:
        type: string
      estado:
        type: string
      fechaEnvio:
        description: 'OQ-3: UpdatedAt would be ideal; using CreatedAt as proxy in
          C4.1'
        type: string
      id:
        type: string
      titulo:
        type: string
    type: object
  dto.PresignResponse:
    properties:
      expiresAt:
        type: string
      key:
        type: string
      uploadUrl:
        type: string
    type: object
  dto.QuestionCreateRequest:
    properties:
      enunciado:
        maxLength: 1000
        minLength: 1
        type: string
      puntaje:
        minimum: 1
        type: integer
      tipo:
        enum:
        - opcion_multiple
        - verdadero_falso
        type: string
    required:
    - enunciado
    - tipo
    type: object
  dto.QuestionDetail:
    properties:
      enunciado:
        type: string
      evaluationId:
        type: string
      id:
        type: string
      options:
        items:
          $ref: '#/definitions/dto.OptionResponse'
        type: array
      orden:
        type: integer
      puntaje:
        type: integer
      tipo:
        type: string
    type: object
  dto.QuestionResponse:
    properties:
      enunciado:
        type: string
      evaluationId:
        type: string
      id:
        type: string
      orden:
        type: integer
      puntaje:
        type: integer
      tipo:
        type: string
    type: object
  dto.QuestionUpdateRequest:
    properties:
      enunciado:
        maxLength: 1000
        minLength: 1
        type: string
      orden:
        minimum: 0
        type: integer
      puntaje:
        minimum: 1
        type: integer
    type: object
  dto.RankingItem:
    properties:
      certCount:
        description: CertCount is the total number of certificates the user has earned.
        type: integer
      posicion:
        description: Posicion is the 1-based rank position.
        type: integer
      userNombre:
        description: UserNombre is the display name of the ranked user.
        type: string
    type: object
  dto.RankingResponse:
    properties:
      ranking:
        items:
          $ref: '#/definitions/dto.RankingItem'
        type: array
    type: object
  dto.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.RejectRequest:
    properties:
      comentario:
        type: string
    type: object
  dto.ReorderRequest:
    properties:
      ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - ids
    type: object
  dto.RolesPatchRequest:
    properties:
      add:
        items:
          type: string
        type: array
      remove:
        items:
          type: string
        type: array
    required:
    - add
    - remove
    type: object
  dto.SectionCreateRequest:
    properties:
      titulo:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - titulo
    type: object
  dto.SectionResponse:
    properties:
      courseId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      orden:
        type: integer
      titulo:
        type: string
    type: object
  dto.SectionUpdateRequest:
    properties:
      titulo:
        maxLength: 200
        minLength: 1
        type: string
    type: object
  dto.SectionWithVideosResponse:
    properties:
      courseId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      orden:
        type: integer
      titulo:
        type: string
      videos:
        items:
          $ref: '#/definitions/dto.VideoResponse'
        type: array
    type: object
  dto.SubmitResponse:
    properties:
      aprobado:
        type: boolean
      puntaje:
        type: integer
    type: object
  dto.SubmitReviewResponse:
    properties:
      courseId:
        type: string
      estado:
        type: string
    type: object
  dto.SupervisionCreateRequest:
    properties:
      empleadoId:
        type: string
      supervisorId:
        type: string
    required:
    - empleadoId
    - supervisorId
    type: object
  dto.SupervisionItem:
    properties:
      creadoEn:
        type: string
      empleadoId:
        type: string
      id:
        type: string
      supervisorId:
        type: string
    type: object
  dto.UpdateCourseRequest:
    properties:
      descripcion:
        maxLength: 5000
        type: string
      titulo:
        maxLength: 200
        minLength: 3
        type: string
    type: object
  dto.UserDTO:
    properties:
      email:
        type: string
      id:
        type: string
      nombre:
        type: string
      roles:
        items:
          type: string
        type: array
    type: object
  dto.UserDetail:
    properties:
      activo:
        type: boolean
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      nombre:
        type: string
      roles:
        items:
          type: string
        type: array
      updatedAt:
        type: string
    type: object
  dto.VideoCreateRequest:
    properties:
      duracionS:
        minimum: 0
        type: integer
      proveedor:
        enum:
        - youtube
        - vimeo
        type: string
      titulo:
        maxLength: 200
        minLength: 1
        type: string
      url:
        type: string
    required:
    - proveedor
    - titulo
    - url
    type: object
  dto.VideoResponse:
    properties:
      createdAt:
        type: string
      duracionS:
        type: integer
      id:
        type: string
      orden:
        type: integer
      proveedor:
        type: string
      sectionId:
        type: string
      titulo:
        type: string
      url:
        type: string
    type: object
  dto.VideoUpdateRequest:
    properties:
      duracionS:
        minimum: 0
        type: integer
      proveedor:
        enum:
        - youtube
        - vimeo
        type: string
      titulo:
        maxLength: 200
        minLength: 1
        type: string
      url:
        type: string
    type: object
  httperr.Error:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: Plataforma interna de formación en video — LMS corporativo
  title: SkillMaker API
  version: "1.0"
paths:
  /approvals/pending:
    get:
      description: Retorna todos los cursos con estado=en_revision. Solo administradores.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PendingItemDTO'
            type: array
        "403":
          description: no es administrador
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Lista cursos en revision
      tags:
      - approvals
  /attempts/{id}:
    get:
      description: Retorna el intento con sus preguntas (sin correcta) y las respuestas
        actuales del estudiante.
      parameters:
      - description: UUID del intento
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AttemptStateResponse'
        "404":
          description: intento no encontrado o no pertenece al usuario
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Obtiene el estado de un intento
      tags:
      - attempts
  /attempts/{id}/answers:
    post:
      consumes:
      - application/json
      description: Registra o actualiza la respuesta del estudiante para una pregunta
        del intento.
      parameters:
      - description: UUID del intento
        in: path
        name: id
        required: true
        type: string
      - description: Respuesta
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.AnswerRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: opcion o pregunta invalida
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: intento no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: intento ya finalizado
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Guarda la respuesta de una pregunta
      tags:
      - attempts
  /attempts/{id}/submit:
    post:
      description: Cierra el intento, calcula el puntaje y retorna el resultado.
      parameters:
      - description: UUID del intento
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SubmitResponse'
        "404":
          description: intento no encontrado
          schema:
            $ref: '#/definitions/httperr.Error'
        "409":
          description: intento ya finalizado
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Finaliza y califica un intento
      tags:
      - attempts
  /auth/google:
    post:
      consumes:
      - application/json
      description: |-
        Valida el ID token de Google, verifica que el campo hd coincida con el
        dominio corporativo configurado (GOOGLE_HOSTED_DOMAIN), crea o actualiza
        el usuario por google_sub y retorna un JWT de acceso + refresh token opaco.
      parameters:
      - description: Google ID token obtenido del cliente
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: token invalido o dominio no autorizado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: error interno
          schema:
            $ref: '#/definitions/httperr.Error'
      summary: Login con Google Workspace
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Revoca el refresh token si existe. Retorna 204 en todos los casos
        (token inexistente, ya revocado, o revocado exitosamente).
        No requiere JWT en el header.
      parameters:
      - description: Refresh token a revocar
        in: body
        name: body
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      responses:
        "204":
          description: No Content
      summary: Revoca el refresh token de la sesion actual (idempotente)
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Valida el refresh token presentado, detecta replay attacks (OWASP),
        revoca el token anterior y emite un par nuevo (access + refresh).
      parameters:
      - description: Refresh token actual
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: token invalido, expirado o reutilizado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: error interno
          schema:
            $ref: '#/definitions/httperr.Error'
      summary: Renueva el access token rotando el refresh token
      tags:
      - auth
  /badges/me:
    get:
      description: Devuelve las insignias ganadas por el usuario autenticado.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListBadgesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Lista mis insignias
      tags:
      - badges
  /badges/ranking:
    get:
      description: Devuelve el top-10 de usuarios con más certificados. Excluye usuarios
        con 0 certificados.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RankingResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Ranking de usuarios por certificados
      tags:
      - badges
  /catalog:
    get:
      description: Retorna una página de cursos con estado='aprobado'. Soporta ?page,
        ?size, ?q (ILIKE titulo).
      parameters:
      - description: Página (default 1)
        in: query
        name: page
        type: integer
      - description: Tamaño de página (max 100, default 20)
        in: query
        name: size
        type: integer
      - description: Filtro ILIKE en titulo
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Página de CatalogCourseCard (items, page, size, total, totalPages)
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Lista cursos aprobados (catálogo público para alumnos)
      tags:
      - catalog
  /catalog/{id}:
    get:
      description: Retorna preview (enrolled=false) o árbol completo (enrolled=true)
        según inscripción.
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: enrolled — árbol completo
          schema:
            $ref: '#/definitions/dto.CourseDetailAlumnoResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httperr.Error'
        "404":
          description: curso no encontrado o no aprobado
          schema:
            $ref: '#/definitions/httperr.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httperr.Error'
      security:
      - BearerAuth: []
      summary: Detalle de un curso aprobado (alumno)
      tags:
      - catalog
  /catalog/{id}/enroll:
    post:
      description: 'Crea una fila de enrollment. Idempotente: segunda llamada devuelve
        200 sin duplicar.'
      parameters:
      - description: UUID del curso
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
