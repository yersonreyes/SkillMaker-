      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SupervisionItem'
        "400":
          description: auto-supervision o body invalido
          schema:
            $ref: '#/definitions/httperr.Error'
        "401":
          description: Unauthorized
