services:
  postgres-dev:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillmaker
      POSTGRES_PASSWORD: skillmaker
      POSTGRES_DB: skillmaker
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skillmaker -d skillmaker']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-dev:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # DEV ONLY: allow browser PUT from Angular dev server (C2.3 presigned upload).
      # Prod (S3/GCS) configures CORS separately via bucket policy — see deploy runbook.
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:4200"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio-dev:
        condition: service_healthy
    volumes:
      - ./minio/cors.json:/config/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio-dev:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/skillmaker-materials;
      mc cors set local/skillmaker-materials /config/cors.json || echo 'cors set unsupported on this mc version, rely on MINIO_API_CORS_ALLOW_ORIGIN';
      exit 0;
      "

volumes:
  postgres_dev_data:
  minio_dev_data:
